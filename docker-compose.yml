services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"  # API Port
      - "9001:9001"  # Console Port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
    restart: always
  
  influxdb:
    image: influxdb:latest
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ROOT_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ROOT_PASSWORD}  
      - DOCKER_INFLUXDB_INIT_ORG=my-class
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor-data
    restart: always

  portal:
    image: python:3.11-slim
    container_name: web_portal
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "pip install streamlit influxdb-client pandas python-dotenv && 
             streamlit run scripts/webportal.py 
             --server.port 8501 
             --server.address 0.0.0.0 
             --server.enableCORS false
             --server.enableXsrfProtection false
             --server.headless true"
    ports:
      - "8501:8501"
    depends_on:
      - influxdb

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - portal